name: Build Android APK and Upload to Drive

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Next.js Web App
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: ./android
        run: chmod +x ./gradlew

      - name: Build Android APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/tool-vault-debug-${{ github.run_number }}.apk

      - name: Upload APK to Google Drive
        uses: mathisve/gdrive-upload-action@v2
        with:
          credentials: ${{ secrets.DRIVE_CREDENTIALS }}
          folderId: ${{ secrets.DRIVE_FOLDER_ID }}
          filename: "android/app/build/outputs/apk/debug/tool-vault-debug-${{ github.run_number }}.apk"
